<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmOps Command Center</title>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --panel-bg: #2d2d2d;
            --electric-blue: #00f3ff;
            --success-green: #00ff9d;
            --alert-red: #ff4d4d;
            --text-main: #e0e0e0;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 60px 1fr 200px;
            gap: 20px;
            height: 100vh;
        }
        
        /* Header */
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--electric-blue);
            padding-bottom: 10px;
        }
        h1 { margin: 0; color: var(--electric-blue); text-transform: uppercase; letter-spacing: 2px; }
        
        /* Agent Status Indicators */
        .agent-status {
            display: flex;
            gap: 15px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--success-green);
            box-shadow: 0 0 10px var(--success-green);
        }
        .agent-label { font-size: 0.8em; color: #888; }
        
        /* Panels */
        .panel {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid #444;
        }
        h2 { margin-top: 0; font-size: 1.1em; border-bottom: 1px solid #555; padding-bottom: 8px; }
        
        /* Activity Feed */
        #activity-feed { grid-column: 2; grid-row: 2; }
        .log-entry {
            background: #333;
            margin-bottom: 10px;
            padding: 10px;
            border-left: 3px solid var(--electric-blue);
            font-family: monospace;
        }
        .log-timestamp { color: #888; font-size: 0.8em; }
        .log-agent { color: var(--electric-blue); font-weight: bold; }
        .log-action { color: var(--success-green); }
        .log-alert { border-left-color: var(--alert-red); }
        
        /* KPI Panel */
        #kpi-panel { grid-column: 3; grid-row: 2; }
        .kpi-card {
            background: #222;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
        }
        .kpi-value { font-size: 1.8em; font-weight: bold; color: var(--electric-blue); }
        .kpi-label { font-size: 0.9em; color: #aaa; }
        
        /* Input Area */
        #input-area { grid-column: 1 / -1; grid-row: 3; display: flex; flex-direction: column; }
        textarea {
            background: #222;
            border: 1px solid var(--electric-blue);
            color: white;
            padding: 10px;
            flex-grow: 1;
            font-family: monospace;
            resize: none;
        }
        button {
            background: var(--electric-blue);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            align-self: flex-end;
        }
        
        /* Left Panel - Agent List */
        #agent-list { grid-column: 1; grid-row: 2; }
        .agent-card {
            padding: 10px;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .agent-icon { font-size: 1.5em; }
        
    </style>
</head>
<body>

    <header>
        <h1>SwarmOps Intelligence</h1>
        <div class="agent-status">
            <div><div class="status-dot"></div><span class="agent-label">SUPERVISOR</span></div>
            <div><div class="status-dot"></div><span class="agent-label">INVENTORY</span></div>
            <div><div class="status-dot"></div><span class="agent-label">PRICING</span></div>
            <div><div class="status-dot"></div><span class="agent-label">FRAUD</span></div>
        </div>
    </header>

    <div id="agent-list" class="panel">
        <h2>Active Agents</h2>
        <div class="agent-card"><span class="agent-icon">🧠</span> Supervisor (Router)</div>
        <div class="agent-card"><span class="agent-icon">📦</span> Inventory Opt.</div>
        <div class="agent-card"><span class="agent-icon">💰</span> Dynamic Pricing</div>
        <div class="agent-card"><span class="agent-icon">🎧</span> Customer Service</div>
        <div class="agent-card"><span class="agent-icon">🔐</span> Fraud Detection</div>
    </div>

    <div id="activity-feed" class="panel">
        <h2>Live Swarm Activity</h2>
        <div id="logs-container">
            <!-- Logs will be injected here via JS -->
        </div>
    </div>

    <div id="kpi-panel" class="panel">
        <h2>Real-Time KPIs</h2>
        <div class="kpi-card">
            <div class="kpi-value" id="kpi-savings">₹0</div>
            <div class="kpi-label">Inventory Cost Saved</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-value" id="kpi-fraud">₹0</div>
            <div class="kpi-label">Fraud Blocked</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-value" id="kpi-queries">0</div>
            <div class="kpi-label">Queries Resolved</div>
        </div>
    </div>

    <div id="input-area" class="panel">
        <h2>Universal Input Stream</h2>
        <textarea placeholder="Paste order JSON, customer query, or stock alert here..."></textarea>
        <button onclick="alert('Simulation Mode: Check Activity Feed for pre-run scenarios')">PROCESS INPUT</button>
    </div>

    <script>
        // Load simulation data
        async function loadData() {
            try {
                const response = await fetch('swarm_simulation_log.json');
                const data = await response.json();
                renderLogs(data);
            } catch (error) {
                console.error('Error loading simulation log:', error);
                document.getElementById('logs-container').innerHTML = '<div class="log-entry">Error loading simulation data. Run python script first.</div>';
            }
        }

        function renderLogs(data) {
            const container = document.getElementById('logs-container');
            let delay = 0;

            data.forEach((entry, index) => {
                setTimeout(() => {
                    // Create log entry for the input
                    const inputDiv = document.createElement('div');
                    inputDiv.className = 'log-entry';
                    inputDiv.innerHTML = `<span class="log-timestamp">${new Date().toLocaleTimeString()}</span> <span class="log-agent">SUPERVISOR</span>: Received input: "${entry.input}"`;
                    container.prepend(inputDiv);

                    // Create log entries for agent responses
                    if (entry.agent_responses) {
                        entry.agent_responses.forEach(resp => {
                            const respDiv = document.createElement('div');
                            respDiv.className = 'log-entry';
                            if (resp.action.includes('CRITICAL') || resp.action.includes('BLOCK')) {
                                respDiv.classList.add('log-alert');
                            }
                            respDiv.innerHTML = `<span class="log-timestamp">${new Date().toLocaleTimeString()}</span> <span class="log-agent">${resp.agent}</span>: ${resp.action} <br> <small>${JSON.stringify(resp.details)}</small>`;
                            container.prepend(respDiv);
                        });
                    }

                    // Update KPIs
                    if (entry.kpi_snapshot) {
                        document.getElementById('kpi-savings').innerText = '₹' + entry.kpi_snapshot.inventory_saved;
                        document.getElementById('kpi-fraud').innerText = '₹' + entry.kpi_snapshot.fraud_blocked;
                        document.getElementById('kpi-queries').innerText = entry.kpi_snapshot.queries_resolved;
                    }

                }, delay);
                delay += 1500; // Stagger the logs for "live" feel
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
